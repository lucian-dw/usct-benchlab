name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -e ".[dev,viz]"
      - run: black --check src tests scripts
      - run: ruff check src tests scripts
      - run: python -m compileall src tests
      - run: pytest -q
      - run: python -m usctbench.cli --help
      - run: python -m usctbench.cli list-algorithms
      - run: bash scripts/run_smoke.sh
      - run: python scripts/audit_release.py
