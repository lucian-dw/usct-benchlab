name: kwave_unified_quality
case_glob: ${USCT_KWAVE_FEATURE_ROOT:-runs/usctbench_runs/kwave_unified_quality/feature_cases}/*.h5
algorithms:
  - name: straight_cgls
    config: configs/algorithms/straight_cgls_laplacian.yaml
  - name: straight_sirt
    config: configs/algorithms/straight_sirt.yaml
  - name: straight_sart
    config: configs/algorithms/straight_sart.yaml
  - name: bent_ray_gn
    config: configs/algorithms/bent_ray_gn.yaml
  - name: attenuation_sirt
    config: configs/algorithms/attenuation_sirt.yaml
  - name: rwave_adapter
    config: configs/algorithms/rwave_adapter.yaml
  - name: fwi_kwave_adapter
    config: configs/algorithms/fwi_kwave_data_sanity.yaml
outputs:
  root: runs/usctbench_runs
min_cases: 1
min_records: 7
expected_statuses:
  - success
require_algorithm_case_matrix: true
required_metrics:
  straight_cgls:
    - rmse
    - selected_valid_fraction
    - ray_weight_mean
  straight_sirt:
    - rmse
    - selected_valid_fraction
    - ray_weight_mean
  straight_sart:
    - rmse
    - selected_valid_fraction
    - ray_weight_mean
  bent_ray_gn:
    - rmse
    - selected_valid_fraction
    - ray_weight_mean
  rwave_adapter:
    - rmse
    - selected_valid_fraction
    - ray_weight_mean
  attenuation_sirt:
    - attenuation_rmse
    - selected_valid_fraction
  fwi_kwave_adapter:
    - fwi_data_sanity_only
    - fwi_raw_time_data_available
    - fwi_freq_data_available
thresholds:
  straight_cgls:
    data_relative_residual: 1.0
  straight_sirt:
    data_relative_residual: 1.0
  straight_sart:
    data_relative_residual: 1.0
  bent_ray_gn:
    data_relative_residual: 1.0
  rwave_adapter:
    data_relative_residual: 1.0
minimums:
  straight_cgls:
    valid_ray_fraction: 0.5
    selected_valid_fraction: 0.45
  straight_sirt:
    valid_ray_fraction: 0.5
    selected_valid_fraction: 0.45
  straight_sart:
    valid_ray_fraction: 0.5
    selected_valid_fraction: 0.45
  bent_ray_gn:
    valid_ray_fraction: 0.5
    selected_valid_fraction: 0.45
  rwave_adapter:
    valid_ray_fraction: 0.5
    selected_valid_fraction: 0.45
  fwi_kwave_adapter:
    fwi_time_data_energy: 1.0e-12
