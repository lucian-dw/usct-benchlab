name: kwave_fwi_main
description: >
  Main k-Wave benchmark for the pure FWI adapter. This suite intentionally
  runs only fwi_kwave_adapter on raw/precomputed k-Wave channel data. Straight
  ray, bent-ray surrogate, attenuation, and rWave surrogate baselines stay in
  travel_time_surrogate_main.
case_glob: ${USCT_KWAVE_FWI_CASE_GLOB:-data/kwave_fwi_main/cases/*.h5}
outputs:
  root: ${USCT_KWAVE_FWI_RUN_ROOT:-runs/usctbench_runs}
run_id: kwave_fwi_main
algorithms:
  - name: fwi_kwave_adapter
    config: configs/algorithms/fwi_kwave_full_pipeline.yaml
expected_algorithms:
  - fwi_kwave_adapter
expected_statuses:
  - success
min_cases: 1
min_records: 1
require_algorithm_case_matrix: true
metadata:
  benchmark_type: kwave_fwi_main
  measurement_provenance: self_simulated_kwave_wavefield_or_precomputed_kwave_mat
  uses_kwave_wavefield: true
  uses_complex_wavefield: true
  inverse_crime_risk: medium
  role: canonical pure FWI path; no diffusion or generative prior
  exclusion: travel-time surrogate algorithms are not run on this suite.
required_metrics:
  fwi_kwave_adapter:
    - external_result_loaded
    - iterations
    - selected_iteration
    - selected_loss
    - best_iteration
    - best_iteration_rmse
    - final_iteration_rmse
    - initial_loss
    - final_loss
    - kwave_gt_rmse
    - kwave_gt_init_rmse
    - kwave_gt_selected_relative_rmse_improvement
    - kwave_gt_final_relative_rmse_improvement
    - kwave_gt_ssim
    - kwave_native_psnr
    - kwave_native_ssim
minimums:
  fwi_kwave_adapter:
    iterations: 1
    kwave_gt_selected_relative_rmse_improvement: 0.1
    kwave_gt_ssim: 0.6
    kwave_native_psnr: 20.0
    kwave_native_ssim: 0.6
thresholds:
  fwi_kwave_adapter:
    kwave_gt_rmse: 30.0
    final_iteration_rmse: 30.0
