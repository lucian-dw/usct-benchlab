name: travel_time_surrogate_main
description: >
  Main v0.1 benchmark for traditional travel-time surrogate methods. These
  cases are property-map-derived fast-oracle/debug measurements, not k-Wave
  wavefield inversion results. Use this suite for straight-ray CGLS/SIRT/SART,
  the regularized bent-ray surrogate, and the rWave travel-time surrogate.
case_glob: ${USCT_TRAVEL_TIME_SURROGATE_CASE_GLOB:-data/travel_time_surrogate_main/cases/*.h5}
outputs:
  root: ${USCT_TRAVEL_TIME_SURROGATE_RUN_ROOT:-runs/usctbench_runs}
run_id: travel_time_surrogate_main
algorithms:
  - name: straight_cgls
    config: configs/algorithms/straight_cgls_laplacian.yaml
  - name: straight_sirt
    config: configs/algorithms/straight_sirt.yaml
  - name: straight_sart
    config: configs/algorithms/straight_sart.yaml
  - name: bent_ray_gn
    config: configs/algorithms/bent_ray_gn.yaml
  - name: rwave_adapter
    config: configs/algorithms/rwave_adapter.yaml
expected_algorithms:
  - straight_cgls
  - straight_sirt
  - straight_sart
  - bent_ray_gn
  - rwave_adapter
expected_statuses:
  - success
min_cases: 1
min_records: 5
require_algorithm_case_matrix: true
metadata:
  benchmark_type: travel_time_surrogate
  measurement_provenance: speedmap_travel_time_surrogate
  uses_kwave_wavefield: false
  uses_complex_wavefield: false
  inverse_crime_risk: high
  role: canonical traditional-method baseline; fast solver sanity/debug layer
  exclusion: k-Wave wavefield cases are reserved for kwave_fwi_main.
required_metrics:
  default:
    - data_residual_norm
    - data_relative_residual
    - data_residual_reduction
    - rmse
    - ssim
    - water_relative_rmse_improvement
    - coverage_nonzero_fraction
    - valid_ray_fraction
    - ring_artifact_index
thresholds:
  default:
    data_relative_residual: 1.0
minimums:
  default:
    coverage_nonzero_fraction: 0.5
    valid_ray_fraction: 0.8
