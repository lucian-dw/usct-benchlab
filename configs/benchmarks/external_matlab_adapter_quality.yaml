name: external_matlab_adapter_quality
description: Four-class 256x256 OpenBreastUS quality comparison for external MATLAB Bent-ray and r-Wave adapters.
case_glob: ${USCT_EXTERNAL_MATLAB_QUALITY_ROOT:-/home/wudalong/usct-benchlab/data/openbreastus_external_matlab_quality_256}/cases/*.h5
algorithms:
  - name: bent_ray_gn
    config: configs/algorithms/bent_ray_gn_external_matlab.yaml
  - name: rwave_adapter
    config: configs/algorithms/rwave_adapter_external_matlab.yaml
outputs:
  root: ${USCT_RUN_ROOT:-/home/wudalong/usct-benchlab/runs/usctbench_runs}
min_cases: 4
min_records: 8
expected_algorithms:
  - bent_ray_gn
  - rwave_adapter
expected_statuses:
  - success
require_algorithm_case_matrix: true
required_metrics:
  default:
    - adapter_dependency_available
    - external_adapter_output_loaded
    - rmse
    - ssim
    - data_residual_norm
    - data_relative_residual
    - data_residual_reduction
    - water_relative_rmse_improvement
    - coverage_nonzero_fraction
    - valid_ray_fraction
    - ring_artifact_index
thresholds:
  default:
    rmse: 180.0
    data_relative_residual: 0.95
minimums:
  default:
    adapter_dependency_available: 1
    external_adapter_output_loaded: 1
    data_residual_reduction: 0.05
    coverage_nonzero_fraction: 0.5
    valid_ray_fraction: 0.8
