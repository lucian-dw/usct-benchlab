name: kwave_real_forward_ray_smoke
case_glob: ${USCT_KWAVE_FEATURE_ROOT:-runs/usctbench_runs/kwave_real_forward_smoke_radius30/feature_cases}/*.h5
algorithms:
  - name: straight_cgls
    config: configs/algorithms/straight_cgls.yaml
  - name: straight_sirt
    config: configs/algorithms/straight_sirt.yaml
  - name: straight_sart
    config: configs/algorithms/straight_sart.yaml
  - name: bent_ray_gn
    config: configs/algorithms/bent_ray_gn.yaml
  - name: attenuation_sirt
    config: configs/algorithms/attenuation_sirt.yaml
  - name: rwave_adapter
    config: configs/algorithms/rwave_adapter.yaml
outputs:
  root: runs/usctbench_runs
min_cases: 1
min_records: 6
expected_statuses:
  - success
require_algorithm_case_matrix: true
required_metrics:
  straight_cgls:
    - data_residual_norm
    - data_relative_residual
    - rmse
    - valid_ray_fraction
  straight_sirt:
    - data_residual_norm
    - data_relative_residual
    - rmse
    - valid_ray_fraction
  straight_sart:
    - data_residual_norm
    - data_relative_residual
    - rmse
    - valid_ray_fraction
  bent_ray_gn:
    - data_residual_norm
    - data_relative_residual
    - rmse
    - valid_ray_fraction
  rwave_adapter:
    - data_residual_norm
    - data_relative_residual
    - rmse
    - valid_ray_fraction
  attenuation_sirt:
    - attenuation_input_signal_norm
    - attenuation_input_has_signal
thresholds:
  straight_cgls:
    data_relative_residual: 1.0
  straight_sirt:
    data_relative_residual: 1.0
  straight_sart:
    data_relative_residual: 1.0
  bent_ray_gn:
    data_relative_residual: 1.0
  rwave_adapter:
    data_relative_residual: 1.0
minimums:
  straight_cgls:
    valid_ray_fraction: 0.5
  straight_sirt:
    valid_ray_fraction: 0.5
  straight_sart:
    valid_ray_fraction: 0.5
  bent_ray_gn:
    valid_ray_fraction: 0.5
  rwave_adapter:
    valid_ray_fraction: 0.5
