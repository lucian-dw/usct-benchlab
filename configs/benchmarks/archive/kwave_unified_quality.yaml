name: kwave_unified_quality_deprecated
description: >
  Deprecated compatibility entry. The old unified suite mixed k-Wave-derived
  feature cases into straight-ray, bent-ray surrogate, attenuation, and rWave
  surrogate benchmarks. The current mainline keeps those traditional methods
  on travel_time_surrogate_main and reserves k-Wave raw/precomputed data for
  kwave_fwi_main.
case_glob: ${USCT_KWAVE_FWI_CASE_GLOB:-data/kwave_fwi_main/cases/*.h5}
algorithms:
  - name: fwi_kwave_adapter
    config: configs/algorithms/fwi_kwave_full_pipeline.yaml
outputs:
  root: runs/usctbench_runs
min_cases: 1
min_records: 1
expected_statuses:
  - success
expected_algorithms:
  - fwi_kwave_adapter
require_algorithm_case_matrix: true
required_metrics:
  fwi_kwave_adapter:
    - external_result_loaded
    - iterations
    - kwave_gt_rmse
    - kwave_gt_ssim
thresholds:
  fwi_kwave_adapter:
    kwave_gt_rmse: 30.0
minimums:
  fwi_kwave_adapter:
    iterations: 1
    kwave_gt_ssim: 0.6
