name: external_matlab_adapter_smoke
description: One-case external MATLAB proof-of-life for Bent-ray and r-Wave adapters.
case_glob: ${USCT_EXTERNAL_MATLAB_SAMPLE_ROOT:-data/openbreastus_external_matlab_smoke_64}/cases/*.h5
algorithms:
  - name: bent_ray_gn
    config: configs/algorithms/experimental/bent_ray_gn_external_matlab.yaml
  - name: rwave_adapter
    config: configs/algorithms/experimental/rwave_adapter_external_matlab.yaml
outputs:
  root: ${USCT_RUN_ROOT:-runs/usctbench_runs}
min_cases: 1
min_records: 2
expected_algorithms:
  - bent_ray_gn
  - rwave_adapter
expected_statuses:
  - success
require_algorithm_case_matrix: true
required_metrics:
  bent_ray_gn:
    - adapter_dependency_available
    - external_adapter_output_loaded
    - rmse
    - ssim
    - data_residual_norm
    - data_relative_residual
    - data_residual_reduction
    - water_relative_rmse_improvement
  rwave_adapter:
    - adapter_dependency_available
    - external_adapter_output_loaded
    - rmse
    - ssim
    - data_residual_norm
    - data_relative_residual
    - data_residual_reduction
    - water_relative_rmse_improvement
thresholds:
  bent_ray_gn:
    rmse: 80.0
    data_relative_residual: 0.95
  rwave_adapter:
    rmse: 80.0
    data_relative_residual: 0.95
minimums:
  bent_ray_gn:
    adapter_dependency_available: 1
    external_adapter_output_loaded: 1
    data_residual_reduction: 0.1
    water_relative_rmse_improvement: 0.0
  rwave_adapter:
    adapter_dependency_available: 1
    external_adapter_output_loaded: 1
    data_residual_reduction: 0.1
    water_relative_rmse_improvement: 0.0
