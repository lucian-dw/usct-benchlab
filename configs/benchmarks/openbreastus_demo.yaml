name: openbreastus_demo
case_glob: ${USCT_OPENBREASTUS_CASE_GLOB:-data/openbreastus_demo/cases/*.h5}
outputs:
  root: ${USCT_RUN_ROOT:-runs/usctbench_runs}
algorithms:
  - name: straight_cgls
    config: configs/algorithms/cgls.yaml
  - name: straight_sirt
    config: configs/algorithms/sirt.yaml
  - name: straight_sart
    config: configs/algorithms/sart.yaml
  - name: bent_ray_gn
    config: configs/algorithms/bent_ray.yaml
  - name: rwave_adapter
    config: configs/algorithms/rwave.yaml
min_cases: 1
min_records: 5
expected_statuses: [success]
required_metrics:
  default: [rmse, ssim, data_relative_residual]
thresholds:
  default:
    data_relative_residual: 1.0
