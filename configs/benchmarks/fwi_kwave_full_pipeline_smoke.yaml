name: fwi_kwave_full_pipeline_smoke
description: One-case A100 k-Wave full-array simulation plus Helmholtz/FWI smoke test.
case_glob: ${USCT_KWAVE_FWI_SAMPLE_ROOT}/*.h5
outputs:
  root: ${USCT_RUN_ROOT}
run_id: fwi_kwave_full_pipeline_smoke
algorithms:
  - name: fwi_kwave_adapter
    config: configs/algorithms/fwi_kwave_full_pipeline.yaml
expected_algorithms:
  - fwi_kwave_adapter
expected_statuses:
  - success
min_cases: 1
min_records: 1
require_algorithm_case_matrix: true
required_metrics:
  fwi_kwave_adapter:
    - external_result_loaded
    - iterations
    - selected_iteration
    - selected_loss
    - best_iteration
    - best_iteration_rmse
    - final_iteration_rmse
    - initial_loss
    - final_loss
    - kwave_gt_rmse
    - kwave_gt_water_relative_rmse_improvement
    - kwave_gt_ssim
    - matlab_psnr_value
    - matlab_ssim_value
minimums:
  fwi_kwave_adapter:
    iterations: 1
    kwave_gt_water_relative_rmse_improvement: 0.0
    kwave_gt_ssim: 0.6
    matlab_psnr_value: 20.0
    matlab_ssim_value: 0.6
thresholds:
  fwi_kwave_adapter:
    kwave_gt_rmse: 30.0
    final_iteration_rmse: 30.0
