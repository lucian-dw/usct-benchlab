name: fwi_kwave_demo
case_glob: ${USCT_KWAVE_FWI_CASE_GLOB:-data/fwi_kwave_demo/cases/*.h5}
outputs:
  root: ${USCT_RUN_ROOT:-runs/usctbench_runs}
algorithms:
  - name: fwi_kwave_adapter
    config: configs/algorithms/fwi_kwave.yaml
min_cases: 1
min_records: 1
expected_statuses: [success]
required_metrics:
  fwi_kwave_adapter:
    - external_result_loaded
    - iterations
    - selected_iteration
    - kwave_gt_rmse
    - kwave_gt_ssim
