name: openbreastus_smoke
case_glob: ${USCT_SAMPLE_ROOT}/cases/*.h5
algorithms:
  - name: straight_sart
    config: configs/algorithms/straight_sart.yaml
  - name: attenuation_sirt
    config: configs/algorithms/attenuation_sirt.yaml
outputs:
  root: ${USCT_RUN_ROOT}
required_metrics:
  straight_sart:
    - data_residual_norm
    - rmse
    - water_relative_rmse_improvement
  attenuation_sirt:
    - data_residual_norm
thresholds:
  straight_sart:
    rmse: 100.0
    data_residual_norm: 1.0e-4
  attenuation_sirt:
    data_residual_norm: 1.0e-4
minimums:
  straight_sart:
    water_relative_rmse_improvement: 0.0
