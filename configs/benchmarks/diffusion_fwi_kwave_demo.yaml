name: diffusion_fwi_kwave_demo
case_glob: ${USCT_DPS_FWI_CASE_GLOB:-data/fwi_kwave_demo/cases/*.h5}
outputs:
  root: ${USCT_RUN_ROOT:-runs/usctbench_runs}
algorithms:
  - name: diffusion_fwi_kwave_adapter
    config: configs/algorithms/diffusion_fwi_kwave.yaml
min_cases: 1
min_records: 1
expected_statuses: [success]
required_metrics:
  diffusion_fwi_kwave_adapter:
    - external_result_loaded
    - checkpoint
    - dataset_path
    - score_reg_t
    - score_reg_lambda
    - steps
    - freqs_mhz
    - array_mode
    - selected_step
    - prior_mode
