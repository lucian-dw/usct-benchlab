name: kwave_128tx_512grid
backend: kwave_a100
case:
  path: ${USCT_KWAVE_PROPERTY_CASE:-}
  case_id: kwave_128tx_512grid_property
  shape: [512, 512]
  n_transducers: 128
  background_mps: 1500.0
  inclusion_mps: 1450.0
  inclusion_radius_m: 0.03
  inclusion_attenuation_np_per_m: 3.0
  density_kg_per_m3: 1000.0
simulation:
  backend: kwave_a100
  python_bin: ${USCT_KWAVE_PYTHON_BIN:-$HOME/miniconda3/envs/usct-kwave/bin/python}
  usct_kwave_root: ${USCT_KWAVE_ROOT:-$HOME/USCT_kwave}
  array_mode: full128
  external_backend: cuda-binary
  reference_sound_speed_mps: 1500.0
  source_wavelet: gauspuls
  source_peak_frequency_hz: 250000.0
  source_bandwidth_hz: 187500.0
  frac_bw: 0.75
  cfl_number: 0.3
  ncalc: 552
  xmax_mm: 120.0
  circle_radius_mm: 110.0
  atten_bkgnd: 0.0
  sos2atten: 0.0
  y_atten: 1.01
  downsample_factor: 1
  pml_thickness_pixels: 20
  generation_mode: direct
  direct_num_workers: 1
  kwave_data_path: auto
  kwave_data_name_prefix: ${USCT_KWAVE_DATA_NAME_PREFIX:-real_4class}
  cuda_devices: [2]
  overwrite: false
  start_matlab: true
  no_connect_existing: true
  timeout_s: 14400
  frequencies_hz: [150000.0, 250000.0, 350000.0, 450000.0]
outputs:
  wavefield_case: ${USCT_KWAVE_WAVE_CASE:-runs/usctbench_runs/kwave_fwi_main/wavefield_cases/kwave_128tx_512grid_wavefield.h5}
  external_root: ${USCT_KWAVE_FORWARD_ROOT:-runs/usctbench_runs/kwave_fwi_main/external_kwave_forward}
feature_extraction:
  default_method: robust_fusion
  formal_xcorr: bounded_normalized
  unbounded_xcorr_allowed_for_solver: false
  speed_bounds_mps: [1300.0, 1700.0]
  min_phase_frequencies: 3
