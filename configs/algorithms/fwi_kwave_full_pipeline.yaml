name: fwi_kwave_adapter
parameters:
  result_path: ${USCT_KWAVE_FWI_RESULT_PATH}
  run_external: true
  execution_mode: ${USCT_KWAVE_EXECUTION_MODE:-invert_existing_dataset}
  baseline_sound_speed_mps: 1500.0
  usct_kwave_root: ${USCT_KWAVE_ROOT:-$HOME/USCT_kwave}
  python_bin: ${USCT_KWAVE_PYTHON_BIN:-$HOME/miniconda3/envs/usct-kwave/bin/python}
  pipeline_module: openbreastus_diffusion.kwave_dps.run_full_pipeline
  mat_path: ${USCT_KWAVE_SOURCE_MAT}
  mat_key: ${USCT_KWAVE_MAT_KEY}
  sample_index: ${USCT_KWAVE_SAMPLE_INDEX}
  use_preprocessed_field: true
  array_mode: full128
  object_scale: 1.0
  object_pose: native
  background_speed: 1500.0
  atten_bkgnd: 0.0
  sos2atten: 0.0
  ncalc: 512
  xmax_mm: 120.0
  circle_radius_mm: 110.0
  backend: cuda-binary
  no_connect_existing: true
  generation_mode: split
  output_dir: ${USCT_KWAVE_OUTPUT_DIR}
  siminfo_path: ${USCT_KWAVE_SIMINFO_PATH}
  scratch_dir: ${USCT_KWAVE_SCRATCH_DIR}
  dataset_path: ${USCT_KWAVE_DATASET_PATH}
  external_log_path: ${USCT_KWAVE_EXTERNAL_LOG_PATH}
  warm_start_builder: bulk_support
  warm_start_module: openbreastus_diffusion.kwave_dps.make_bulk_support_init
  warm_start_path: ${USCT_KWAVE_WARM_START_PATH}
  warm_start_summary_path: ${USCT_KWAVE_WARM_START_SUMMARY_PATH}
  warm_start_diagnostic_prefix: ${USCT_KWAVE_WARM_START_DIAGNOSTIC_PREFIX}
  warm_start_args:
    - --init-mode
    - bulk_support
    - --background-speed
    - "1500"
    - --arrival-picker
    - hilbert
    - --min-confidence
    - "1.5"
    - --residual-clip-us
    - "5"
    - --residual-percentile
    - "95"
    - --max-rays
    - "8000"
    - --smooth-sigma-mm
    - "10"
    - --support-mode
    - backprojection
    - --support-percentile
    - "45"
    - --support-sigma-mm
    - "8"
    - --support-alpha-sigma-mm
    - "8"
    - --support-dilate-mm
    - "4"
    - --bulk-update-scale
    - "1.0"
    - --bulk-min-path-mm
    - "20"
    - --bulk-stat
    - median
    - --velocity-bounds
    - "1408.692"
    - "1595.1279"
    - --compare-gt
  reconstruction_iteration: ${USCT_KWAVE_RECONSTRUCTION_ITERATION:-best}
  overwrite: true
  start_matlab: true
  sos_freqs_mhz:
    - 0.3
    - 0.325
    - 0.35
    - 0.375
    - 0.4
    - 0.425
    - 0.45
    - 0.475
    - 0.5
    - 0.525
    - 0.55
    - 0.575
    - 0.6
    - 0.625
    - 0.65
    - 0.675
    - 0.7
    - 0.725
    - 0.75
    - 0.775
    - 0.8
  sos_iters:
    - 3
  sos_atten_freqs_mhz: []
  atten_iters:
    - 0
  tx_downsample: 1
  recon_dxi_mm: 0.3
  c_geom: 1500.0
  c_init: 1500.0
  sign_conv: -1.0
  step_damping: 0.25
  velocity_bounds:
    - 1408.692
    - 1595.1279
  exclude_neighbor_fraction: 0.123046875
  perc_outliers: 0.99
  tof_pre_frac: 0.05
  filter_cutoff: 0.75
  max_update_mps: 12.0
  save_raw_grad_iters: 0
  timeout_s: 21600
metadata:
  external_source: ${USCT_KWAVE_ROOT:-$HOME/USCT_kwave}/openbreastus_diffusion/kwave_dps/run_full_pipeline.py
  default_mode: invert_existing_dataset
  default_dataset_alignment: preproc_crop300_tla250 existing k-Wave MAT, full128 cuda-binary, attenuation disabled.
  default_initialization: bulk-support warm start from openbreastus_diffusion.kwave_dps.make_bulk_support_init.
  frequency_schedule_mhz: "0.3:0.025:0.8 with 3 sound-speed iterations per frequency"
  reference_bulk_support_doc: ${USCT_KWAVE_ROOT:-$HOME/USCT_kwave}/openbreastus_diffusion/kwave_dps/docs/experiments/2026-06-02_bulk_support_dps_mainline.md
  reference_bulk_support_config: ${USCT_KWAVE_ROOT:-$HOME/USCT_kwave}/openbreastus_diffusion/kwave_dps/configs/bulk_support_dps_notebook30_mainline.json
  reference_pure_fwi_metrics: "test201 pure FWI inside_psnr=26.4539 inside_ssim=0.8315 inside_corr=0.9520 inside_hp_corr=0.9240"
  default_selection: best RMSE iteration against external C_INTERP, with final iteration retained as a diagnostic artifact.
  fallback_initialization: unset warm_start_builder to use constant background/debug mode.
  v0_1_scope: k-Wave simulation plus Helmholtz/FWI only; no diffusion or generative priors.
