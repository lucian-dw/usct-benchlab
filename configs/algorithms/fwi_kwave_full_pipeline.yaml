name: fwi_kwave_adapter
parameters:
  result_path: ${USCT_KWAVE_FWI_RESULT_PATH}
  run_external: true
  execution_mode: full_pipeline_from_speed_map
  baseline_sound_speed_mps: 1500.0
  usct_kwave_root: ${USCT_KWAVE_ROOT}
  python_bin: ${USCT_KWAVE_PYTHON_BIN}
  pipeline_module: openbreastus_diffusion.kwave_dps.run_full_pipeline
  mat_path: ${USCT_KWAVE_SOURCE_MAT}
  mat_key: ${USCT_KWAVE_MAT_KEY}
  sample_index: ${USCT_KWAVE_SAMPLE_INDEX}
  array_mode: full128
  object_scale: 1.0
  object_pose: native
  background_speed: 1500.0
  atten_bkgnd: 0.0
  sos2atten: 0.0
  ncalc: 512
  xmax_mm: 120.0
  circle_radius_mm: 110.0
  backend: cuda-binary
  generation_mode: split
  output_dir: ${USCT_KWAVE_OUTPUT_DIR}
  siminfo_path: ${USCT_KWAVE_SIMINFO_PATH}
  scratch_dir: ${USCT_KWAVE_SCRATCH_DIR}
  dataset_path: ${USCT_KWAVE_DATASET_PATH}
  external_log_path: ${USCT_KWAVE_EXTERNAL_LOG_PATH}
  warm_start_builder: traveltime
  warm_start_path: ${USCT_KWAVE_WARM_START_PATH}
  warm_start_summary_path: ${USCT_KWAVE_WARM_START_SUMMARY_PATH}
  warm_start_diagnostic_prefix: ${USCT_KWAVE_WARM_START_DIAGNOSTIC_PREFIX}
  warm_start_args:
    - --update-scale
    - "-1"
    - --recon-dxi-mm
    - "0.3"
    - --velocity-bounds
    - "1408.7"
    - "1595.1"
  reconstruction_iteration: best
  overwrite: true
  start_matlab: true
  sos_freqs_mhz:
    - 0.3
    - 0.35
    - 0.4
    - 0.45
    - 0.5
    - 0.55
    - 0.6
    - 0.65
    - 0.7
    - 0.75
    - 0.8
  sos_iters:
    - 3
  sos_atten_freqs_mhz: []
  atten_iters:
    - 0
  tx_downsample: 1
  recon_dxi_mm: 0.3
  c_geom: 1500.0
  c_init: 1500.0
  sign_conv: -1.0
  step_damping: 0.25
  velocity_bounds:
    - 1408.692
    - 1595.1279
  max_update_mps: 12.0
  save_raw_grad_iters: 33
  timeout_s: 21600
metadata:
  external_source: /home/wudalong/USCT_kwave/openbreastus_diffusion/kwave_dps/run_full_pipeline.py
  default_mode: full_pipeline_from_speed_map
  default_initialization: RF travel-time warm start with sign-corrected slowness update.
  frequency_schedule_mhz: "0.3:0.05:0.8 with 3 sound-speed iterations per frequency"
  default_selection: best available image-domain iteration, with final and best artifacts rendered for review.
  fallback_initialization: unset warm_start_builder to use constant background/debug mode.
  v0_1_scope: k-Wave simulation plus Helmholtz/FWI only; no diffusion or generative priors.
