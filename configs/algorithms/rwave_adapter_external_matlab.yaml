name: rwave_adapter
parameters:
  backend: matlab
  matlab_bin: ${MATLAB_BIN:-/usr/local/MATLAB/R2021b/bin/matlab}
  external_root: ${USCT_RWAVE_ROOT:-/home/wudalong/usct-benchlab/external/ray-based-quantitative-ultrasound-tomography}
  entrypoint: ${USCT_RWAVE_ENTRYPOINT:-/home/wudalong/usct-benchlab/code/scripts/matlab_adapters/rwave_tof_greens_entrypoint.m}
  timeout_s: 900
  outer_iterations: 2
  inner_iterations: 24
  step_length: 1.0
  regularization: laplacian
  regularization_lambda: 2.0e-5
  smooth_sigma: 0.75
  roi_update_only: true
  reference_sound_speed_mps: 1500.0
  sound_speed_bounds_mps: [1300.0, 1700.0]
metadata:
  external_reference: Ash1362/ray-based-quantitative-ultrasound-tomography
  external_entrypoint_template: scripts/matlab_adapters/rwave_tof_greens_entrypoint.m
  benchmark_role: optional external MATLAB smoke for ray-Born/r-Wave lineage.
  complex_contract: Uses /rwave Rytov/scattered-field adapter input when available; otherwise falls back to ToF smoke.
  warning: This entrypoint is complex-contract aware but still not the full reconstructGreensImage workflow.
