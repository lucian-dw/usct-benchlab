name: fwi_kwave_adapter
parameters:
  result_path: ${USCT_KWAVE_FWI_RESULT_PATH}
  run_external: true
  execution_mode: invert_existing_dataset
  baseline_sound_speed_mps: 1500.0
  usct_kwave_root: ${USCT_KWAVE_ROOT:-/home/wudalong/USCT_kwave}
  python_bin: ${USCT_KWAVE_PYTHON_BIN:-/home/wudalong/miniconda3/envs/usct-kwave/bin/python}
  pipeline_module: openbreastus_diffusion.kwave_dps.run_full_pipeline
  dataset_path: ${USCT_KWAVE_DATASET_PATH}
  external_log_path: ${USCT_KWAVE_EXTERNAL_LOG_PATH}
  warm_start_builder: traveltime
  warm_start_path: ${USCT_KWAVE_WARM_START_PATH}
  warm_start_summary_path: ${USCT_KWAVE_WARM_START_SUMMARY_PATH}
  warm_start_diagnostic_prefix: ${USCT_KWAVE_WARM_START_DIAGNOSTIC_PREFIX}
  warm_start_args:
    - --background-speed
    - "1500"
    - --recon-dxi-mm
    - "0.6"
    - --coarse-dxi-mm
    - "3.0"
    - --fov-radius-mm
    - "85.0"
    - --calibration-impact-radius-mm
    - "78.0"
    - --exclude-neighbor-fraction
    - "0.123046875"
    - --arrival-picker
    - abs
    - --min-confidence
    - "2.0"
    - --residual-clip-us
    - "8.0"
    - --residual-percentile
    - "99.0"
    - --max-rays
    - "5000"
    - --ray-step-mm
    - "1.5"
    - --min-path-mm
    - "6.0"
    - --lsqr-damp
    - "0.03"
    - --lsqr-iter-lim
    - "250"
    - --smooth-sigma-mm
    - "6.0"
    - --support-mode
    - backprojection
    - --support-percentile
    - "45.0"
    - --support-sigma-mm
    - "5.0"
    - --support-alpha-sigma-mm
    - "2.5"
    - --support-dilate-mm
    - "4.0"
    - --velocity-bounds
    - "1408.7"
    - "1595.1"
    - --update-scale
    - "-1"
    - --compare-gt
  reconstruction_iteration: ${USCT_KWAVE_RECONSTRUCTION_ITERATION:-best}
  overwrite: true
  start_matlab: true
  no_connect_existing: true
  backend: cuda-binary
  sos_freqs_mhz:
    - 0.3
  sos_iters:
    - 1
  sos_atten_freqs_mhz: []
  atten_iters:
    - 0
  tx_downsample: 1
  recon_dxi_mm: 0.6
  c_geom: 1500.0
  c_init: 1500.0
  sign_conv: -1.0
  step_damping: 0.25
  velocity_bounds:
    - 1408.692
    - 1595.1279
  exclude_neighbor_fraction: 0.123046875
  perc_outliers: 0.99
  tof_pre_frac: 0.05
  filter_cutoff: 0.75
  max_update_mps: 12.0
  save_raw_grad_iters: 0
  timeout_s: 21600
metadata:
  purpose: one-case real k-Wave debug inversion from an existing forward-only dataset.
  data_sanity_only: false
  input_contract: uses the same external object_dataset.mat standardized into the wavefield case.
  v0_1_scope: low-frequency sound-speed debug only; no diffusion or generative priors.
