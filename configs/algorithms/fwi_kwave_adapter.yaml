name: fwi_kwave_adapter
parameters:
  result_path: ${USCT_KWAVE_FWI_RESULT_PATH}
  run_external: false
  reconstruction_iteration: ${USCT_KWAVE_RECONSTRUCTION_ITERATION:-best}
  baseline_sound_speed_mps: 1500.0
  usct_kwave_root: ${USCT_KWAVE_ROOT}
  pipeline_module: openbreastus_diffusion.kwave_dps.run_full_pipeline
  pipeline_args:
    - --sos-freqs-mhz
    - "0.3"
    - --sos-iters
    - "1"
    - --tx-downsample
    - "1"
    - --recon-dxi-mm
    - "0.6"
metadata:
  external_source: rehmanali1994/WaveformInversionUST-derived k-Wave pipeline
  default_mode: ingest_existing_result
  default_selection: best RMSE iteration against external C_INTERP when an iteration stack is available.
