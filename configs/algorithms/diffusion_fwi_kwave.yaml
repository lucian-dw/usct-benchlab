name: diffusion_fwi_kwave_adapter
parameters:
  # Loader-only by default. Set run_external: true only in an environment where
  # the external USCT-kwave package, checkpoint, MATLAB/k-Wave runtime, and CUDA
  # device are deliberately available.
  result_path: ${USCT_DPS_FWI_RESULT_PATH:-}
  summary_path: ${USCT_DPS_FWI_SUMMARY_PATH:-}
  dataset_path: ${USCT_DPS_DATASET_PATH:-}
  run_external: false
  usct_kwave_root: ${USCT_KWAVE_ROOT:-}
  python_bin: ${USCT_KWAVE_PYTHON_BIN:-}
  checkpoint: ${USCT_DPS_CHECKPOINT:-}
  external_log_path: ${USCT_DPS_FWI_LOG_PATH:-}
  timeout_s: 21600

  # Mainline diffusion + FWI settings.
  array_mode: sparse64
  warm_start_builder: bulk_support
  selected_field: auto
  steps: 12
  freqs_mhz:
    - 0.3
    - 0.3
    - 0.3
    - 0.35
    - 0.35
    - 0.35
    - 0.4
    - 0.4
    - 0.4
    - 0.45
    - 0.45
    - 0.45
  sampler_mode: reference
  prior_mode: score_reg
  score_reg_t: 0.10
  score_reg_lambda: 0.1
  prior_strength: 1.0
  prior_start_step: 1
  prior_every: 1
  prior_stop_step: 0
  prior_mask_mode: none
  physics_position: pre
  physics_inner_steps: 1
  eta: 0.1
  guidance_gain: 1.15
  gradient_mode: slowness_precond
  step_strategy: line_search
  mask_mode: support_alpha
  output_selection: final
  final_prior_update: false

  # External runner defaults.
  device: cuda:0
  seed: 1234
  tx_stride: 1
  crop_source_size: 300
  source_size: 480
  sign_conv: -1
  perc_outliers: 0.99
  target_max_abs: 1.0
  support_guidance: true
  normalize_observed: true
  start_matlab: false

  # Bulk-support warm start settings.
  background_speed: 1500
  arrival_picker: hilbert
  min_confidence: 1.5
  residual_clip_us: 5
  residual_percentile: 95
  max_rays: 8000
  smooth_sigma_mm: 10
  support_mode: backprojection
  support_percentile: 45
  support_sigma_mm: 8
  support_alpha_sigma_mm: 8
  support_dilate_mm: 4
  bulk_update_scale: 1.0
  bulk_min_path_mm: 20
  bulk_stat: median
  velocity_bounds:
    - 1408.692
    - 1595.1279
  compare_gt: true
