name: straight_cgls
parameters:
  iterations: 30
  regularization: identity
  regularization_lambda: 0.0
  # Set regularization: laplacian with regularization_lambda > 0 to penalize roughness.
  reference_sound_speed_mps: 1500.0
  sound_speed_bounds_mps: [1300.0, 1700.0]
metadata:
  damping_convention: damping is lambda^2 for identity Tikhonov regularization.
  lambda_sweep: try regularization_lambda in [0.0, 1.0e-5, 3.0e-5, 1.0e-4] on noisy feature cases.
