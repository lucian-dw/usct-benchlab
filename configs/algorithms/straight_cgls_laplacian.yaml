name: straight_cgls
parameters:
  iterations: 30
  regularization: laplacian
  regularization_lambda: 2.0e-2
  min_ray_weight: 0.0
  ray_weight_power: 1.0
  reference_sound_speed_mps: 1500.0
  sound_speed_bounds_mps: [1300.0, 1700.0]
metadata:
  description: Straight-ray CGLS travel-time surrogate baseline with Laplacian roughness regularization.
  damping_convention: regularization_lambda is lambda; the solver uses lambda^2 in the normal equations.
  benchmark_role: travel-time surrogate mainline for traditional methods; not a k-Wave wavefield inversion result.
  lambda_sweep: try regularization_lambda in [3.0e-3, 1.0e-2, 2.0e-2, 3.0e-2, 5.0e-2] on noisy travel-time surrogate cases.
  measurement_provenance: speedmap_travel_time_surrogate
  uses_kwave_wavefield: false
