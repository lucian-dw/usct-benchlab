name: rwave_adapter
parameters:
  backend: python
  outer_iterations: 3
  inner_iterations: 20
  step_length: 1.0
  regularization: laplacian
  regularization_lambda: 1.0e-5
  smooth_sigma: 0.35
  roi_update_only: false
  reference_sound_speed_mps: 1500.0
  sound_speed_bounds_mps: [1300.0, 1700.0]
  matlab_bin: null
  external_root: null
  entrypoint: null
  timeout_s: 300
metadata:
  default_backend: project-native ray-Born/r-Wave surrogate over benchmark travel-time features.
  external_reference: Ash1362/ray-based-quantitative-ultrasound-tomography
  external_entrypoint_template: scripts/matlab_adapters/rwave_tof_greens_entrypoint.m
  v0_1_scope: smoke/quality benchmark path; optional MATLAB entrypoints use standard input/output MAT artifacts.
